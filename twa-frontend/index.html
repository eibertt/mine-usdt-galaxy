<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Miners</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #00d4ff; --gold: #ffcc00; --bg-dark: #090a0f; }
        body { 
            background: url('https://raw.githubusercontent.com/eibertt/mine-usdt-galaxy/main/bot/background.png') no-repeat center center fixed; 
            background-size: cover; background-color: var(--bg-dark);
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
        }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; position: fixed; width: 100%; box-sizing: border-box; z-index: 100; background: rgba(0,0,0,0.5); }
        .user-info { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; }
        .user-info img { width: 25px; border-radius: 50%; border: 1px solid var(--main-blue); }
        .page { display: none; height: 100vh; padding: 80px 20px 100px 20px; overflow-y: auto; box-sizing: border-box; flex-direction: column; align-items: center; }
        .active-page { display: flex; }
        .stat-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin: 10px 0; width: 100%; backdrop-filter: blur(5px); }
        .ship-img { width: 180px; filter: drop-shadow(0 0 15px var(--main-blue)); margin: 20px 0; }
        .btn-action { background: linear-gradient(135deg, #00d4ff 0%, #0055ff 100%); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; width: 100%; box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3); }
        .navbar { position: fixed; bottom: 0; width: 100%; background: rgba(22, 27, 34, 0.95); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #30363d; backdrop-filter: blur(10px); }
        .nav-item { color: #8b949e; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; }
        .nav-item.active { color: var(--main-blue); transform: translateY(-5px); }
        .nav-item i { font-size: 22px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="user-info">
            <img id="user-pic" src="https://via.placeholder.com/25">
            <span id="user-name">Capitán</span>
        </div>
        <button class="user-info" style="border:none; cursor:pointer;" onclick="alert('Ajustes pronto...')"><i class="fas fa-cog"></i></button>
    </div>

    <div id="home" class="page active-page">
        <h2 style="color: var(--main-blue); margin: 0;">CABINA DE MANDO</h2>
        <img src="https://raw.githubusercontent.com/eibertt/mine-usdt-galaxy/main/bot/ship.png" class="ship-img">
        <div class="stat-card">
            <div style="font-size: 14px; color: #aaa;">Balance T-Coins</div>
            <div style="font-size: 32px; color: var(--gold); font-weight: bold;">💰 <span id="bal">0.00</span></div>
        </div>
        <button class="btn-action" style="height: 100px; width: 100px; border-radius: 50%;" onclick="mine()">MINAR</button>
    </div>

    <div id="earnings" class="page">
        <h2 style="color: var(--main-blue);">CENTRO DE MINADO</h2>
        <div class="stat-card" style="display: flex; align-items: center; gap: 15px; text-align: left;">
            <img src="https://raw.githubusercontent.com/eibertt/mine-usdt-galaxy/main/bot/ship.png" style="width: 70px;">
            <div>
                <b>Sonda Nano (Nivel 1)</b><br>
                <small>Producción: 30 T-Coins/h</small><br>
                <span style="color: var(--gold);">Precio: 1 USDT</span>
            </div>
        </div>
        <button class="btn-action">ADQUIRIR MEJORA</button>
    </div>

    <nav class="navbar">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="showPage('earnings', this)"><i class="fas fa-rocket"></i>Earnings</div>
        <div class="nav-item" onclick="showPage('group', this)"><i class="fas fa-users"></i>Group</div>
        <div class="nav-item" onclick="showPage('wallet', this)"><i class="fas fa-wallet"></i>Wallet</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            if (tg.initDataUnsafe.user.photo_url) document.getElementById('user-pic').src = tg.initDataUnsafe.user.photo_url;
        }

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            element.classList.add('active');
        }

        let balance = 0;
        function mine() {
            balance += 0.01;
            document.getElementById('bal').innerText = balance.toFixed(2);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }
    </script>
</body>
</html>
