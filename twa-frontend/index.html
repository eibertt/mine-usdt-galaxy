<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Galaxia USDT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-container">
        
        <main id="content-area">
            
            <section id="home-view" class="page-view active">
                <div class="header">
                    <h2>Imperial Dorada</h2>
                    <p class="subtitle">5,000 T-Coin / h</p>
                    <span class="badge">100 USDT</span>
                </div>
                <div class="main-mining-area">
                    <img src="../assets/robot2.png" alt="Robot Minero" style="max-width: 200px;">
                    <h3>Bóveda Actual</h3>
                    <p>T-Coins: 0</p>
                    <p>USDT: 0.00</p>
                </div>
            </section>

            <section id="group-view" class="page-view">
                <h2>Group</h2>
                <div class="card">
                    <h3><i class="fas fa-bullhorn"></i> Invitar Amigos</h3>
                    <p>Gana 2,500 T-Coins por referido</p>
                </div>
            </section>

            <section id="earnings-view" class="page-view">
                <h2>Earnings</h2>
                <div class="card">
                    <h3><i class="fas fa-globe"></i> Portal TecnoHoy</h3>
                    <p>Gana 1,000 T-Coins por visita</p>
                </div>
            </section>

            <section id="accelerate-view" class="page-view">
                <h2>Accelerate (Naves)</h2>
                <p>Aquí irá el listado de naves para comprar y aumentar el minado.</p>
            </section>

            <section id="wallet-view" class="page-view">
                <h2>Wallet</h2>
                <button class="action-btn">CAMBIAR A USDT</button>
            </section>

        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home-view', this)">
                <div class="icon-wrapper"><i class="fas fa-home"></i></div>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="switchTab('group-view', this)">
                <div class="icon-wrapper"><i class="fas fa-user-friends"></i></div>
                <span>Group</span>
            </button>
            <button class="nav-item center-btn" onclick="switchTab('earnings-view', this)">
                <div class="icon-wrapper"><i class="fas fa-space-shuttle"></i></div>
                <span>Earnings</span>
            </button>
            <button class="nav-item" onclick="switchTab('accelerate-view', this)">
                <div class="icon-wrapper"><i class="fas fa-rocket"></i></div>
                <span>Accelerate</span>
            </button>
            <button class="nav-item" onclick="switchTab('wallet-view', this)">
                <div class="icon-wrapper"><i class="fas fa-wallet"></i></div>
                <span>Wallet</span>
            </button>
        </nav>

    </div>
    <script src="app.js"></script>
</body>
</html>
